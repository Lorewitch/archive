<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Библиотека Лороведьмы — архив</title>
  <meta name="description" content="Интерактивный архив игровых текстов Библиотеки Лороведьмы" />
  <style>
    :root {
      --bg: #E8DED4;
      --surface: #F6F2EB;
      --surface-soft: #EFE8DE;
      --surface-muted: #E1D6C8;
      --ink: #2A2521;
      --muted: #6F665F;
      --soft: #8A8077;
      --line: #CBBFAF;
      --line-strong: #AFA394;
      --accent: #5B4A3E;
      --accent-hover: #6F5D50;
      --accent-soft: #D8CEC0;
      --shadow: 0 16px 38px rgba(91, 74, 62, .11);
      --shadow-soft: 0 8px 22px rgba(91, 74, 62, .075);
      --sidebar: 310px;
      --radius-page: 18px;
      --radius-card: 14px;
      --radius-control: 9px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(203, 191, 175, .50), transparent 31rem),
        radial-gradient(circle at 94% 4%, rgba(91, 74, 62, .08), transparent 27rem),
        linear-gradient(135deg, #F6F2EB 0%, #E8DED4 52%, #CBBFAF 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    body.menu-open { overflow: hidden; }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      gap: 24px;
      width: min(1500px, calc(100% - 52px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
    }

    .mobile-top {
      display: none;
    }

    .sidebar,
    .page-card,
    .text-card {
      border: 1px solid rgba(91, 74, 62, .20);
      border-radius: var(--radius-page);
      background: rgba(246, 242, 235, .90);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      position: sticky;
      top: 28px;
      align-self: start;
      height: calc(100vh - 56px);
      padding: 20px;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .brand {
      display: grid;
      gap: 8px;
      justify-items: center;
      margin-bottom: 26px;
      text-align: center;
    }

    .brand-head {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: rgba(246, 242, 235, .68);
      box-shadow: 0 12px 22px rgba(91, 74, 62, .18);
      overflow: hidden;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-title {
      color: #211B17;
      font-size: 22px;
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -.035em;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
    }

    .nav {
      display: grid;
      gap: 8px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(91, 74, 62, .18);
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: 13px 14px;
      background: transparent;
      color: #332B25;
      cursor: pointer;
      text-align: left;
      transition: background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .nav-item:hover {
      background: rgba(203, 191, 175, .36);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: var(--surface);
      box-shadow: 0 12px 22px rgba(91, 74, 62, .20);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 16px;
      font-weight: 800;
    }

    .nav-icon {
      display: block;
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      object-fit: contain;
    }

    .sidebar-note {
      margin-top: 18px;
      padding: 14px;
      border: 1px solid rgba(91, 74, 62, .12);
      border-radius: 10px;
      background: rgba(203, 191, 175, .52);
      color: #4E4239;
      font-size: 13px;
    }

    .back-main {
      display: inline-flex;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      border-bottom: 1px solid transparent;
    }

    .back-main:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .content {
      display: grid;
      gap: 20px;
      min-width: 0;
    }

    .page-card {
      min-width: 0;
      padding: 30px 34px;
    }

    .page-head {
      margin-bottom: 26px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      color: #211B17;
      line-height: 1.05;
      letter-spacing: -.045em;
    }

    h1 {
      font-size: clamp(38px, 4.5vw, 64px);
      font-weight: 950;
    }

    h2 {
      font-size: clamp(30px, 3vw, 46px);
      font-weight: 930;
    }

    h3 {
      font-size: clamp(23px, 2vw, 32px);
      font-weight: 900;
    }

    .lead {
      max-width: 860px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search-symbol {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--soft);
      pointer-events: none;
    }

    .search input,
    .select {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(91, 74, 62, .24);
      border-radius: var(--radius-control);
      background: rgba(246, 242, 235, .95);
      color: var(--ink);
      box-shadow: none;
      outline: none;
    }

    .search input {
      padding: 13px 48px 13px 42px;
      direction: ltr;
      unicode-bidi: plaintext;
    }

    .search input:focus,
    .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91, 74, 62, .12);
    }

    .search-clear {
      position: absolute;
      right: 9px;
      top: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, color .16s ease;
    }

    .search-clear.visible {
      display: inline-flex;
    }

    .search-clear:hover,
    .search-clear:focus-visible {
      background: var(--accent-soft);
      border-color: var(--line-strong);
      color: var(--ink);
      outline: none;
    }

    .select {
      min-height: 48px;
      padding: 12px 14px;
      cursor: pointer;
    }

    .catalog-table {
      overflow: hidden;
      border: 1px solid rgba(91, 74, 62, .20);
      border-radius: 12px;
      background: rgba(246, 242, 235, .78);
    }

    .catalog-row {
      display: grid;
      grid-template-columns: minmax(240px, 1.9fr) minmax(180px, 1fr) 90px minmax(150px, .8fr);
      gap: 16px;
      align-items: center;
      min-width: 0;
      padding: 15px 18px;
      border-bottom: 1px solid rgba(91, 74, 62, .14);
    }

    .catalog-row:last-child {
      border-bottom: 0;
    }

    .catalog-row.head {
      background: rgba(203, 191, 175, .42);
      color: #4E4239;
      font-size: 13px;
      font-weight: 880;
      text-transform: uppercase;
      letter-spacing: .055em;
    }

    .sortable-head {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-weight: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
    }

    .sort-arrows {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
      font-size: 9px;
      line-height: .8;
      color: var(--soft);
    }

    .sort-arrows .active {
      color: var(--accent);
    }

    .catalog-row.item {
      cursor: pointer;
      transition: background .18s ease;
    }

    .catalog-row.item:hover,
    .catalog-row.item:focus-visible {
      background: rgba(232, 222, 212, .52);
      outline: none;
    }

    .book-title {
      color: #211B17;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.32;
    }

    .book-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .lang-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .tiny-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border: 1px solid rgba(91, 74, 62, .10);
      border-radius: 7px;
      background: rgba(203, 191, 175, .52);
      color: #4E4239;
      font-size: 12px;
      font-weight: 780;
      line-height: 1.2;
    }

    .empty {
      min-height: 280px;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
      color: var(--muted);
    }

    .empty-card {
      max-width: 560px;
      padding: 26px;
      border: 1px solid rgba(91, 74, 62, .16);
      border-radius: var(--radius-card);
      background: rgba(246, 242, 235, .72);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 850;
      cursor: pointer;
    }

    .back-link:hover {
      color: var(--ink);
    }

    .book-page h1 {
      max-width: 1120px;
      font-size: clamp(34px, 4.15vw, 60px);
      overflow-wrap: anywhere;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(17px, 1.8vw, 22px);
      overflow-wrap: anywhere;
    }

    .reader-toolbar {
      margin: 24px 0 18px;
      padding: 12px 0;
      border-top: 1px solid rgba(91, 74, 62, .16);
      border-bottom: 1px solid rgba(91, 74, 62, .16);
    }

    .volume-strip {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      align-items: center;
      gap: 10px 14px;
      min-width: 0;
    }

    .toolbar-label {
      color: var(--soft);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .075em;
      white-space: nowrap;
    }

    .mode-button,
    .volume-scroll button,
    .lang-switch button {
      border: 1px solid rgba(91, 74, 62, .12);
      border-radius: var(--radius-control);
      background: rgba(203, 191, 175, .44);
      color: var(--ink);
      box-shadow: none;
      cursor: pointer;
      font-weight: 850;
      white-space: nowrap;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }

    .mode-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      background: rgba(246, 242, 235, .88);
      color: var(--accent);
      border-color: rgba(91, 74, 62, .28);
    }

    .volume-scroll {
      display: flex;
      gap: 8px;
      min-width: 0;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 0 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .volume-scroll button {
      flex: 0 0 auto;
      padding: 10px 15px;
    }

    .mode-button.active,
    .volume-scroll button.active,
    .lang-switch button.active {
      background: var(--accent);
      color: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 9px 18px rgba(91, 74, 62, .16);
    }

    .text-card {
      padding: 28px;
      border-radius: 16px;
      background: rgba(246, 242, 235, .90);
      box-shadow: 0 14px 32px rgba(91, 74, 62, .055);
    }

    .volume-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(91, 74, 62, .18);
    }

    .volume-title-main {
      min-width: 0;
    }

    .volume-title-main h3 {
      overflow-wrap: anywhere;
    }

    .lang-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      max-width: 100%;
    }

    .lang-switch {
      display: flex;
      gap: 7px;
      max-width: 100%;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .lang-switch::-webkit-scrollbar {
      display: none;
    }

    .lang-switch button {
      flex: 0 0 auto;
      min-width: 50px;
      padding: 9px 13px;
    }

    .prose {
      color: #2A2521;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.92;
    }

    .notes,
    .catalog-meta,
    .footer-note {
      border-radius: 10px;
    }

    .notes {
      margin-top: 22px;
      padding: 16px 18px;
      border: 1px solid rgba(91, 74, 62, .12);
      background: rgba(203, 191, 175, .34);
      color: #4E4239;
    }

    .notes-title {
      margin-bottom: 6px;
      font-weight: 900;
    }

    .catalog-meta {
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid rgba(91, 74, 62, .16);
      background: rgba(246, 242, 235, .68);
      color: var(--muted);
    }

    .catalog-meta summary {
      cursor: pointer;
      padding: 13px 16px;
      font-weight: 850;
      list-style-position: inside;
    }

    .catalog-meta-body {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
      font-size: 14px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .footer-note {
      margin-top: 20px;
      padding: 16px 18px;
      background: var(--accent);
      color: var(--surface);
      font-size: 12px;
    }

    .drawer-backdrop {
      display: none;
    }

    @media (max-width: 1180px) {
      .mobile-top {
        position: fixed;
        z-index: 80;
        inset: 0 0 auto 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 56px;
        padding: 10px max(12px, env(safe-area-inset-left)) 10px max(12px, env(safe-area-inset-right));
        border-bottom: 1px solid rgba(91, 74, 62, .18);
        background: rgba(246, 242, 235, .96);
        backdrop-filter: blur(14px);
      }

      .menu-button {
        border: 1px solid rgba(91, 74, 62, .22);
        border-radius: var(--radius-control);
        background: rgba(246, 242, 235, .90);
        color: var(--accent);
        padding: 9px 11px;
        cursor: pointer;
        font-weight: 900;
      }

      .mobile-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        color: #211B17;
        font-weight: 930;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mobile-brand img {
        display: block;
        width: 24px;
        height: 24px;
        object-fit: contain;
        flex: 0 0 24px;
      }

      .app {
        display: block;
        width: 100%;
        max-width: 100vw;
        padding: 72px clamp(10px, 2.4vw, 22px) 24px;
        overflow-x: hidden;
      }

      .content {
        width: min(100%, 980px);
        margin: 0 auto;
      }

      .sidebar {
        position: fixed;
        z-index: 100;
        top: 66px;
        bottom: 12px;
        left: 12px;
        width: min(420px, calc(100vw - 24px));
        height: auto;
        max-width: calc(100vw - 24px);
        transform: translateX(calc(-100% - 24px));
        transition: transform .22s ease;
        overflow-x: hidden;
        box-shadow: 0 24px 70px rgba(91, 74, 62, .22);
      }

      body.menu-open .sidebar {
        transform: translateX(0);
      }

      .drawer-backdrop {
        position: fixed;
        z-index: 90;
        inset: 0;
        display: block;
        width: 100vw;
        background: rgba(42, 37, 33, .36);
        opacity: 0;
        pointer-events: none;
        transition: opacity .22s ease;
      }

      body.menu-open .drawer-backdrop {
        opacity: 1;
        pointer-events: auto;
      }
    }

    @media (max-width: 980px) {
      .page-card {
        padding: clamp(16px, 3.2vw, 24px);
      }

      .page-head {
        margin-bottom: 20px;
      }

      h1,
      .book-page h1 {
        font-size: clamp(34px, 8vw, 52px);
      }

      .lead,
      .subtitle {
        font-size: clamp(14px, 2.6vw, 17px);
      }

      .toolbar {
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
      }

      .catalog-table {
        display: grid;
        gap: 12px;
        border: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
      }

      .catalog-row.head {
        display: none;
      }

      .catalog-row.item {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 0;
        width: 100%;
        padding: 16px;
        border: 1px solid rgba(91, 74, 62, .20);
        border-radius: 14px;
        background: rgba(246, 242, 235, .88);
        box-shadow: 0 12px 28px rgba(91, 74, 62, .07);
      }

      .catalog-row.item > div:not(:first-child) {
        display: none;
      }

      .book-title {
        font-size: clamp(17px, 3.5vw, 20px);
      }

      .book-subtitle {
        font-size: 13px;
      }

      .volume-strip {
        grid-template-columns: 1fr;
        align-items: stretch;
        gap: 9px;
      }

      .mode-button {
        width: fit-content;
        max-width: 100%;
      }

      .volume-title {
        display: grid;
        gap: 12px;
      }

      .lang-control {
        justify-self: start;
        overflow: hidden;
      }
    }

    @media (max-width: 560px) {
      body {
        background: var(--surface);
      }

      .mobile-top {
        min-height: 56px;
        gap: 8px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .mobile-brand {
        max-width: 58vw;
        font-size: 13px;
      }

      .menu-button {
        padding: 8px 10px;
        font-size: 12px;
      }

      .app {
        padding: 68px 8px 18px;
      }

      .content {
        gap: 10px;
      }

      .page-card,
      .text-card {
        border-radius: 14px;
      }

      .page-card {
        padding: 14px;
      }

      .page-head {
        margin-bottom: 16px;
      }

      h1,
      .book-page h1 {
        font-size: clamp(30px, 11vw, 42px);
      }

      .lead,
      .subtitle {
        font-size: 14px;
        line-height: 1.62;
      }

      .search input,
      .select {
        min-height: 42px;
        font-size: 14px;
      }

      .catalog-row.item {
        padding: 14px;
      }

      .back-link {
        margin-bottom: 20px;
        font-size: 13px;
      }

      .reader-toolbar {
        margin: 18px 0 14px;
      }

      .text-card {
        padding: 16px;
      }

      .volume-title {
        padding-bottom: 14px;
        margin-bottom: 18px;
      }

      .lang-control {
        gap: 8px;
      }

      .lang-switch button,
      .volume-scroll button,
      .mode-button {
        min-height: 38px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .prose {
        font-size: 16px;
        line-height: 1.82;
      }
    }

    @media (max-width: 360px) {
      .page-card,
      .text-card {
        padding: 12px;
      }

      h1,
      .book-page h1 {
        font-size: 30px;
      }

      .mobile-brand span:last-child {
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-height: 520px) and (max-width: 980px) {
      .mobile-top {
        min-height: 48px;
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .app {
        padding-top: 58px;
      }

      .page-card {
        padding: 14px;
      }

      h1,
      .book-page h1 {
        font-size: clamp(30px, 7vw, 44px);
      }
    }

    /* v24: mobile reader layout refined from mockup */
    @media (max-width: 700px) {
      .book-page {
        padding: 14px;
      }

      .book-page .back-link {
        margin-bottom: 16px;
      }

      .book-page .page-head {
        padding-bottom: 16px;
        margin-bottom: 14px;
        border-bottom: 1px solid rgba(91, 74, 62, .14);
      }

      .book-page h1 {
        max-width: 100%;
        font-size: clamp(34px, 10vw, 46px);
        line-height: .98;
      }

      .book-page .subtitle {
        margin-top: 10px;
        font-size: 14px;
        line-height: 1.45;
      }

      .reader-toolbar {
        margin: 0 0 14px;
        padding: 0 0 14px;
        border-top: 0;
        border-bottom: 1px solid rgba(91, 74, 62, .14);
      }

      .volume-strip {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .mode-button {
        width: 100%;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        border-color: rgba(91, 74, 62, .22);
        background: var(--accent);
        color: var(--surface);
        box-shadow: none;
        text-shadow: none;
      }

      .mode-button.active {
        background: var(--accent);
        color: var(--surface);
        box-shadow: none;
      }

      .reader-toolbar .toolbar-label {
        margin-top: 2px;
      }

      .volume-scroll {
        display: flex;
        gap: 8px;
        width: 100%;
        padding: 0 0 4px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .volume-scroll button {
        min-width: 64px;
        min-height: 38px;
        padding: 8px 12px;
      }

      .text-card {
        padding: 16px;
      }

      .volume-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px 12px;
        padding-bottom: 14px;
        margin-bottom: 18px;
      }

      .volume-title-main {
        flex: 1 1 auto;
      }

      .volume-title-main h3 {
        font-size: clamp(24px, 7vw, 32px);
        line-height: 1.05;
      }

      .lang-control {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex: 0 0 auto;
        margin-left: auto;
      }

      .lang-control .toolbar-label {
        margin: 0;
        font-size: 11px;
      }

      .lang-switch {
        gap: 6px;
        overflow: visible;
      }

      .lang-switch button {
        min-width: 42px;
        min-height: 36px;
        padding: 7px 10px;
        font-size: 13px;
      }

      .prose {
        font-size: 16px;
        line-height: 1.82;
      }
    }

    @media (max-width: 380px) {
      .book-page h1 {
        font-size: clamp(30px, 10vw, 38px);
      }

      .volume-title {
        align-items: flex-start;
      }

      .lang-control {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
      }
    }

  </style>
</head>
<body>
  <div class="mobile-top">
    <button class="menu-button" id="open-menu" type="button">☰ Разделы</button>
    <div class="mobile-brand"><img src="assets/icons/logo_icon_05.png" alt=""><span>Библиотека Лороведьмы</span></div>
  </div>
  <div class="drawer-backdrop" id="drawer-backdrop"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-head">
          <div class="brand-mark"><img src="assets/icons/logo_icon_05.png" alt="Логотип Библиотеки Лороведьмы"></div>
          <div class="brand-title">Библиотека<br>Лороведьмы</div>
        </div>
        <div class="brand-subtitle">публичная база игровых текстов</div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-note">Левое меню содержит только разделы. Списки книг, оружия и предметов открываются в центральной части архива.</div>
      <a class="back-main" href="https://www.lorewitchlib.online/home">← вернуться на основной сайт</a>
    </aside>
    <main class="content" id="app"></main>
  </div>

<script>
let BOOKS = [];
const BOOK_DETAILS = new Map();

async function fetchJson(path) {
  const response = await fetch(path, { cache: "no-cache" });
  if (!response.ok) throw new Error(`Не удалось загрузить ${path}: ${response.status}`);
  return response.json();
}

async function loadArchiveData() {
  BOOKS = await fetchJson("data/books_index.json");
}

async function getBookById(id) {
  if (BOOK_DETAILS.has(id)) return BOOK_DETAILS.get(id);
  const book = await fetchJson(`data/books/${encodeURIComponent(id)}.json`);
  BOOK_DETAILS.set(id, book);
  return book;
}

const SECTIONS = [
  { id: "books", icon: "assets/icons/03_book_icon.png", title: "Книги", description: "Игровые книги, записки и многотомные серии." },
  { id: "artifacts", icon: "assets/icons/04_cup_icon.png", title: "Артефакты", description: "Сеты артефактов и связанные тексты." },
  { id: "weapons", icon: "assets/icons/01_weapon_icon.png", title: "Оружие", description: "Оружие, истории и описания." },
  { id: "items", icon: "assets/icons/02_inventory_icon.png", title: "Предметы", description: "Материалы, квестовые предметы и прочее." }
];

const state = {
  section: "books",
  bookId: null,
  lang: "ru",
  volume: 1,
  readAll: false,
  query: "",
  region: "all",
  sort: "asc"
};

const app = document.getElementById("app");
const nav = document.getElementById("nav");
const collator = new Intl.Collator("ru", { numeric: true, sensitivity: "base" });

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>'"]/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "'": "&#039;",
    "\"": "&quot;"
  }[char]));
}

function titleOf(book, lang = "ru") {
  return book?.title?.[lang] || book?.title?.ru || book?.title?.en || book?.title?.zh || "Без названия";
}

function langLabel(lang) {
  return ({ ru: "RU", en: "EN", zh: "中文" })[lang] || lang.toUpperCase();
}

function closeMenu() {
  document.body.classList.remove("menu-open");
}

function setRoute(section, bookId = null) {
  state.section = section;
  state.bookId = bookId;
  closeMenu();
  window.location.hash = bookId ? `#/${section}/${bookId}` : `#/${section}`;
  render();
}

function parseHash() {
  const parts = window.location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
  state.section = parts[0] || "books";
  state.bookId = parts[1] || null;
}

function renderNav() {
  nav.innerHTML = SECTIONS.map(section => `
    <button class="nav-item ${state.section === section.id ? "active" : ""}" type="button" data-section="${section.id}">
      <span class="nav-left"><img class="nav-icon" src="${section.icon}" alt="" loading="lazy">${section.title}</span>
      <span>›</span>
    </button>
  `).join("");

  nav.querySelectorAll("[data-section]").forEach(button => {
    button.addEventListener("click", () => setRoute(button.dataset.section));
  });
}

function uniqueRegions() {
  const regions = new Set();
  BOOKS.forEach(book => {
    String(book.region || "")
      .split(",")
      .map(region => region.trim())
      .filter(Boolean)
      .forEach(region => regions.add(region));
  });
  return [...regions].sort(collator.compare);
}

function filteredBooks() {
  const q = state.query.trim().toLowerCase();
  const rows = BOOKS.filter(book => {
    const searchable = [
      titleOf(book, "ru"),
      titleOf(book, "en"),
      titleOf(book, "zh"),
      book.region,
      ...(book.tags || [])
    ].join(" ").toLowerCase();

    const queryOk = !q || searchable.includes(q);
    const regionOk = state.region === "all" || String(book.region || "")
      .split(",")
      .map(region => region.trim())
      .includes(state.region);

    return queryOk && regionOk;
  });

  rows.sort((a, b) => {
    const result = collator.compare(titleOf(a, "ru"), titleOf(b, "ru"));
    return state.sort === "asc" ? result : -result;
  });

  return rows;
}

function catalogRow(book) {
  return `
    <div class="catalog-row item" data-book-id="${escapeHtml(book.id)}" tabindex="0" role="button" aria-label="Открыть книгу ${escapeHtml(titleOf(book))}">
      <div>
        <div class="book-title">${escapeHtml(titleOf(book, "ru"))}</div>
        <div class="book-subtitle">${escapeHtml(titleOf(book, "en"))} · ${escapeHtml(titleOf(book, "zh"))}</div>
      </div>
      <div>${escapeHtml(book.region || "—")}</div>
      <div>${escapeHtml(book.volume_count || book.volumes?.length || 1)}</div>
      <div class="lang-pills">${(book.languages || []).map(lang => `<span class="tiny-pill">${langLabel(lang)}</span>`).join("")}</div>
    </div>
  `;
}

function renderCatalogTable() {
  const rows = filteredBooks();
  const sortUp = state.sort === "asc" ? "active" : "";
  const sortDown = state.sort === "desc" ? "active" : "";

  return `
    <div class="catalog-table" id="catalog-table">
      <div class="catalog-row head">
        <div>
          <button class="sortable-head" id="sort-title" type="button" aria-label="Сортировать по названию">
            <span>Название</span>
            <span class="sort-arrows" aria-hidden="true"><span class="${sortUp}">▲</span><span class="${sortDown}">▼</span></span>
          </button>
        </div>
        <div>Регион</div>
        <div>Томов</div>
        <div>Языки</div>
      </div>
      ${rows.map(catalogRow).join("") || `<div class="empty"><div class="empty-card">Ничего не найдено. Попробуй изменить поиск или регион.</div></div>`}
    </div>
  `;
}

function renderBooksCatalog() {
  const regions = uniqueRegions();
  app.innerHTML = `
    <section class="page-card catalog-page">
      <div class="page-head">
        <h1>Книги</h1>
        <p class="lead">Полный каталог книжных серий, игровых записок и текстов на разных языках. Выбери книгу из списка — карточка откроется здесь же, в центральной части архива.</p>
      </div>

      <div class="toolbar">
        <label class="search" aria-label="Поиск по книгам">
          <span class="search-symbol">⌕</span>
          <input id="book-search" type="text" inputmode="search" autocomplete="off" spellcheck="false" placeholder="Название, регион или тег..." value="${escapeHtml(state.query)}">
          <button class="search-clear ${state.query ? "visible" : ""}" id="clear-search" type="button" aria-label="Очистить поиск">×</button>
        </label>

        <select class="select" id="region-filter" aria-label="Фильтр по региону">
          <option value="all">Все регионы</option>
          ${regions.map(region => `<option value="${escapeHtml(region)}" ${state.region === region ? "selected" : ""}>${escapeHtml(region)}</option>`).join("")}
        </select>
      </div>

      <div id="catalog-holder">${renderCatalogTable()}</div>
    </section>
  `;

  bindBooksCatalog();
}

function updateCatalogTable() {
  document.getElementById("catalog-holder").innerHTML = renderCatalogTable();
  bindCatalogRows();
  document.getElementById("sort-title")?.addEventListener("click", toggleSort);
}

function toggleSort() {
  state.sort = state.sort === "asc" ? "desc" : "asc";
  updateCatalogTable();
}

function bindCatalogRows() {
  document.querySelectorAll("[data-book-id]").forEach(row => {
    row.addEventListener("click", () => setRoute("books", row.dataset.bookId));
    row.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        setRoute("books", row.dataset.bookId);
      }
    });
  });
}

function bindBooksCatalog() {
  const search = document.getElementById("book-search");
  const filter = document.getElementById("region-filter");
  const clearSearch = document.getElementById("clear-search");

  search?.addEventListener("input", event => {
    state.query = event.target.value;
    clearSearch.classList.toggle("visible", Boolean(state.query));
    updateCatalogTable();
  });

  clearSearch?.addEventListener("click", () => {
    state.query = "";
    if (search) {
      search.value = "";
      search.focus();
    }
    clearSearch.classList.remove("visible");
    updateCatalogTable();
  });

  filter?.addEventListener("change", event => {
    state.region = event.target.value;
    updateCatalogTable();
  });

  document.getElementById("sort-title")?.addEventListener("click", toggleSort);
  bindCatalogRows();
}

function renderBookDetail(book) {
  app.innerHTML = `
    <section class="page-card book-page">
      <button class="back-link" id="back-books" type="button">← Назад к каталогу книг</button>

      <div class="page-head">
        <h1>${escapeHtml(titleOf(book, "ru"))}</h1>
        <div class="subtitle">${escapeHtml(titleOf(book, "en"))} · ${escapeHtml(titleOf(book, "zh"))}</div>
      </div>

      <div class="reader-toolbar" aria-label="Управление чтением">
        <div class="volume-strip" aria-label="Оглавление томов">
          <button class="mode-button ${state.readAll ? "active" : ""}" id="toggle-read-all" type="button">${state.readAll ? "Читать по томам" : "Читать всё подряд"}</button>
          <span class="toolbar-label">Тома</span>
          <div class="volume-scroll">
            ${book.volumes.map(volume => `<button type="button" data-volume="${volume.number}" class="${!state.readAll && state.volume === volume.number ? "active" : ""}">${escapeHtml(volume.title?.[state.lang] || "Том " + volume.number)}</button>`).join("")}
          </div>
        </div>
      </div>

      <div id="reader-text-area">${renderTextArea(book)}</div>

      <details class="catalog-meta">
        <summary>Сведения для каталога и фильтров</summary>
        <div class="catalog-meta-body">
          <div><strong>Регион:</strong> ${escapeHtml(book.region || "—")}</div>
          <div><strong>Томов:</strong> ${escapeHtml(book.volume_count || book.volumes.length)}</div>
          <div><strong>Языки:</strong> ${(book.languages || []).map(langLabel).join(" · ")}</div>
          <div class="tag-list">${(book.tags || []).map(tag => `<span class="tiny-pill">#${escapeHtml(tag)}</span>`).join("")}</div>
        </div>
      </details>

      <div class="footer-note">
        ${escapeHtml(book.public_credit || "Оригинальный игровой текст: Genshin Impact")}<br>
        ${escapeHtml(book.rights_note || "")}
      </div>
    </section>
  `;

  bindBookDetail(book);
}

function renderTextArea(book) {
  const volumes = state.readAll ? book.volumes : book.volumes.filter(volume => volume.number === state.volume);

  return volumes.map((volume, index) => {
    const volumeTitle = escapeHtml(volume.title?.[state.lang] || "Том " + volume.number);
    const languageControl = index === 0 ? `
      <div class="lang-control" aria-label="Язык текста">
        <span class="toolbar-label">Язык</span>
        <div class="lang-switch">
          ${["ru", "en", "zh"].map(lang => `<button type="button" data-lang="${lang}" class="${state.lang === lang ? "active" : ""}">${langLabel(lang)}</button>`).join("")}
        </div>
      </div>
    ` : "";

    return `
      <article class="text-card" id="volume-${volume.number}">
        <div class="volume-title">
          <div class="volume-title-main"><h3>${volumeTitle}</h3></div>
          ${languageControl}
        </div>
        <div class="prose">${escapeHtml(volume.text?.[state.lang] || "[нет текста]")}</div>
        <div class="notes">
          <div class="notes-title">Заметки Лороведьмы</div>
          <div>${escapeHtml(book.notes?.byVolume?.[volume.number] || book.notes?.general || "Заметки пока не заполнены.")}</div>
        </div>
      </article>
    `;
  }).join("");
}

function preserveScrollRender(renderFn) {
  const x = window.scrollX;
  const y = window.scrollY;
  renderFn();
  requestAnimationFrame(() => window.scrollTo(x, y));
}

function bindBookDetail(book) {
  document.getElementById("back-books")?.addEventListener("click", () => setRoute("books"));

  document.getElementById("toggle-read-all")?.addEventListener("click", () => {
    state.readAll = !state.readAll;
    preserveScrollRender(() => renderBookDetail(book));
  });

  document.querySelectorAll("[data-volume]").forEach(button => {
    button.addEventListener("click", () => {
      state.volume = Number(button.dataset.volume);
      state.readAll = false;
      preserveScrollRender(() => renderBookDetail(book));
    });
  });

  document.querySelectorAll("[data-lang]").forEach(button => {
    button.addEventListener("click", () => {
      state.lang = button.dataset.lang;
      preserveScrollRender(() => renderBookDetail(book));
    });
  });
}

function renderLoading(message = "Загружаю архив…") {
  app.innerHTML = `
    <section class="page-card">
      <div class="empty"><div class="empty-card">${escapeHtml(message)}</div></div>
    </section>
  `;
}

function renderError(message) {
  app.innerHTML = `
    <section class="page-card">
      <div class="page-head"><h1>Ошибка загрузки</h1></div>
      <div class="empty"><div class="empty-card">${escapeHtml(message)}</div></div>
    </section>
  `;
}

function renderEmptySection(section) {
  app.innerHTML = `
    <section class="page-card">
      <div class="page-head">
        <h1>${section.title}</h1>
        <p class="lead">${section.description}</p>
      </div>
      <div class="empty">
        <div class="empty-card">Раздел готов к наполнению. Позже здесь появится таблица записей по тому же принципу: список в центре, карточка выбранного предмета — отдельным экраном.</div>
      </div>
    </section>
  `;
}

async function render() {
  parseHash();
  renderNav();

  if (state.section === "books" && state.bookId) {
    renderLoading("Открываю книгу…");
    try {
      const book = await getBookById(state.bookId);
      renderBookDetail(book);
    } catch (error) {
      renderError(error.message || "Не удалось открыть книгу.");
    }
    return;
  }

  if (state.section === "books") {
    renderBooksCatalog();
    return;
  }

  const section = SECTIONS.find(item => item.id === state.section) || SECTIONS[0];
  renderEmptySection(section);
}

async function init() {
  renderLoading();
  try {
    await loadArchiveData();
    await render();
  } catch (error) {
    renderError(error.message || "Не удалось загрузить данные архива.");
  }
}

document.getElementById("open-menu")?.addEventListener("click", () => document.body.classList.add("menu-open"));
document.getElementById("drawer-backdrop")?.addEventListener("click", closeMenu);
window.addEventListener("hashchange", render);
window.addEventListener("keydown", event => {
  if (event.key === "Escape") closeMenu();
});

init();
</script>
