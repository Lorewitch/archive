name: Build archive data and styles

on:
  push:
    branches: [ main ]
    paths:
      - 'content/books/**'
      - 'content/artifacts/**'
      - 'content/weapons/**'
      - 'content/items/**'
      - 'content/enemies/**'
      - 'src/css/**'
      - 'tools/build_archive.py'
      - 'tools/build_css.py'
      - 'tools/check_archive.py'
      - '.github/workflows/build-archive.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build JSON data from Markdown
        run: python tools/build_archive.py

      - name: Build CSS bundle
        run: python tools/build_css.py

      - name: Check generated archive
        run: python tools/check_archive.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data assets/css/archive.css
          if git diff --cached --quiet; then
            echo "No generated file changes."
          else
            git commit -m "Update generated archive files"
            git push
          fi
