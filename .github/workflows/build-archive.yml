name: Build archive data, styles and cache

on:
  push:
    branches: [ main ]
    paths:
      - 'content/books/**'
      - 'content/artifacts/**'
      - 'content/weapons/**'
      - 'content/items/**'
      - 'content/stories/**'
      - 'content/enemies/**'
      - 'src/css/**'
      - 'tools/build_archive.py'
      - 'tools/build_bot_mentions_index.py'
      - 'tools/build_css.py'
      - 'tools/check_archive.py'
      - 'tools/bump_cache_version.py'
      - 'assets/js/archive.js'
      - 'assets/icons/**'
      - '.github/workflows/build-archive.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build JSON data from Markdown
        run: python tools/build_archive.py

      - name: Build bot mentions index
        run: python tools/build_bot_mentions_index.py

      - name: Build CSS bundle
        run: python tools/build_css.py

      - name: Bump cache version when public assets changed
        shell: bash
        run: |
          set -euo pipefail

          public_changed=false
          changed_files="$(mktemp)"
          before="${{ github.event.before }}"

          if ! git diff --quiet -- data assets/css/archive.css; then
            public_changed=true
          fi

          if [ -n "$before" ] \
            && [ "$before" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$before^{commit}" 2>/dev/null; then
            git diff --name-only "$before" "${{ github.sha }}" > "$changed_files"
          else
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" > "$changed_files"
          fi

          if grep -Eq '^(assets/js/archive\.js|assets/icons/)' "$changed_files"; then
            public_changed=true
          fi

          if [ "$public_changed" = true ]; then
            python tools/bump_cache_version.py
          else
            echo "Public assets are unchanged; cache version stays as is."
          fi

      - name: Check generated archive
        run: python tools/check_archive.py

      - name: Commit generated files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data assets/css/archive.css index.html
          if git diff --cached --quiet; then
            echo "No generated file changes."
          else
            git commit -m "Update generated archive files and cache version"
            git push
          fi