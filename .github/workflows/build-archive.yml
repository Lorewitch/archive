name: Build archive data

on:
  push:
    branches: [ main ]
    paths:
      - 'content/books/**'
      - 'tools/build_archive.py'
      - '.github/workflows/build-archive.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build JSON data from Markdown
        run: python tools/build_archive.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No generated data changes."
          else
            git commit -m "Update archive data"
            git push
          fi
